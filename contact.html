    <main>
        <section id="contact">

            <h2>Contact Me</h2>

            <p><strong>Email:</strong> selvikavitha@email.com</p>
            <p><strong>Phone:</strong> +91 9123456789</p>
            <p><strong>Location:</strong> Tamil Nadu, India</p>

            <!-- Contact Form -->
            <form action="#" method="post">

                <!-- Name -->
                <label for="name">Name</label><br>
                <input type="text" id="name" name="name" placeholder="Enter your name" required minlength="3"><br><br>

                <!-- Email -->
                <label for="email">Email</label><br>
                <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

                <!-- Subject -->
                <label for="subject">Subject</label><br>
                <input type="text" id="subject" name="subject" placeholder="Enter subject" required><br><br>

                <!-- Message -->
                <label for="message">Message</label><br>
                <textarea id="message" name="message" rows="5" placeholder="Write your message here..."
                    required></textarea><br><br>

                <!-- Submit -->
                <button type="submit">Send Message</button>

            </form>

        </section>
    </main>
